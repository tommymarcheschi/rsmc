<!doctype html>
<html lang="en" data-skin="pokeball">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="PokéVault — Personal Pokémon TCG Collector Intelligence" />
		<meta name="theme-color" content="#12111a" />
		<script>
			// Apply saved skin before first paint to prevent flash
			try {
				const skin = localStorage.getItem('pokevault-skin');
				if (skin) document.documentElement.setAttribute('data-skin', skin);
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
